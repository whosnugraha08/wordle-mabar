<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wordle Mabar - Live Sync!</title>
    
    <style>
        /* --- VARIABEL WARNA (DARK MODE MODERN) --- */
        :root {
            --bg-color: #121213;
            --text-color: #ffffff;
            --border-color: #3a3a3c;
            --correct: #538d4e;
            --present: #b59f3b;
            --absent: #3a3a3c;
            --sidebar-bg: #1e1e1f;
        }

        * { box-sizing: border-box; font-family: 'Inter', 'Helvetica Neue', Arial, sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-color); margin: 0; display: flex; height: 100vh; overflow: hidden; }

        /* --- SIDEBAR MULTIPLAYER --- */
        #sidebar { width: 260px; background-color: var(--sidebar-bg); border-right: 1px solid var(--border-color); padding: 20px; display: flex; flex-direction: column; gap: 15px; overflow-y: auto; z-index: 10; }
        .sidebar-title { font-size: 14px; text-transform: uppercase; letter-spacing: 1px; color: #818384; margin-bottom: 5px; border-bottom: 1px solid var(--border-color); padding-bottom: 10px; }
        .player-card { display: flex; align-items: center; gap: 12px; background: rgba(255,255,255,0.03); padding: 10px; border-radius: 8px; border: 1px solid transparent; transition: all 0.3s; }
        .player-card.done { border-color: var(--correct); background: rgba(83, 141, 78, 0.1); } 
        .avatar { width: 35px; height: 35px; background-color: var(--border-color); border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 18px; font-weight: bold; text-transform: uppercase; }
        .player-info { display: flex; flex-direction: column; gap: 5px; }
        .player-name { font-size: 13px; font-weight: bold; }
        
        .mini-grid { display: flex; flex-direction: column; gap: 2px; }
        .mini-row { display: flex; gap: 2px; }
        .mini-box { width: 8px; height: 8px; background-color: #818384; border-radius: 1px; }
        .mini-green { background-color: var(--correct); }
        .mini-yellow { background-color: var(--present); }
        .mini-gray { background-color: var(--absent); }

        /* --- AREA GAME UTAMA --- */
        #main-area { flex-grow: 1; display: flex; flex-direction: column; align-items: center; padding: 20px; position: relative; }
        header { width: 100%; max-width: 500px; border-bottom: 1px solid var(--border-color); display: flex; justify-content: center; padding-bottom: 10px; margin-bottom: 30px; }
        header h1 { margin: 0; font-size: 32px; font-weight: 700; letter-spacing: 2px; }

        #board { display: grid; grid-template-rows: repeat(6, 1fr); gap: 5px; margin-bottom: 30px; }
        .row { display: grid; grid-template-columns: repeat(5, 1fr); gap: 5px; transition: transform 0.1s; }
        .box { width: 62px; height: 62px; border: 2px solid var(--border-color); display: flex; justify-content: center; align-items: center; font-size: 32px; font-weight: bold; text-transform: uppercase; }

        /* --- KEYBOARD --- */
        #keyboard { display: flex; flex-direction: column; gap: 8px; align-items: center; width: 100%; max-width: 500px; }
        .key-row { display: flex; gap: 6px; justify-content: center; width: 100%; }
        .key { flex: 1; height: 58px; background-color: #818384; border-radius: 4px; display: flex; justify-content: center; align-items: center; font-weight: bold; cursor: pointer; user-select: none; max-width: 43px; transition: background-color 0.2s; }
        .key.large { max-width: 65px; font-size: 12px; }
        
        .correct { background-color: var(--correct) !important; border-color: var(--correct) !important; color: white; }
        .present { background-color: var(--present) !important; border-color: var(--present) !important; color: white; }
        .absent { background-color: var(--absent) !important; border-color: var(--absent) !important; color: white; }

        /* --- OVERLAY MODALS --- */
        .overlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(18, 18, 19, 0.9); backdrop-filter: blur(5px); display: flex; justify-content: center; align-items: center; z-index: 1000; transition: opacity 0.3s ease; }
        .modal { background: var(--sidebar-bg); border: 1px solid var(--border-color); border-radius: 12px; padding: 30px; width: 90%; max-width: 400px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5); transform: translateY(0); transition: transform 0.3s ease; }
        .modal h2 { margin-top: 0; font-size: 24px; margin-bottom: 10px; }
        .hidden { opacity: 0; pointer-events: none; }
        .hidden .modal { transform: translateY(-50px); }

        .name-input { width: 100%; padding: 12px; border-radius: 6px; border: 2px solid var(--border-color); background: var(--bg-color); color: white; font-size: 16px; margin-bottom: 15px; text-align: center; outline: none; }
        .name-input:focus { border-color: #818384; }
        .btn-primary { background: var(--correct); color: white; border: none; padding: 12px 24px; font-size: 16px; font-weight: bold; border-radius: 6px; cursor: pointer; width: 100%; transition: opacity 0.2s; }
        .btn-primary:hover { opacity: 0.8; }
        .btn-primary:disabled { background: #818384; cursor: not-allowed; }
        .result-item { display: flex; justify-content: space-between; align-items: center; padding: 10px; border-bottom: 1px solid var(--border-color); }
        .result-item:last-child { border-bottom: none; }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* --- RESPONSIVE --- */
        @media (max-width: 768px) {
            body { flex-direction: column; }
            #sidebar { width: 100%; height: 130px; border-right: none; border-bottom: 1px solid var(--border-color); flex-direction: row; overflow-x: auto; padding: 10px; }
            .player-card { flex-direction: column; align-items: center; gap: 5px; min-width: 80px; }
            .box { width: 50px; height: 50px; font-size: 24px; }
            .key { height: 50px; max-width: 35px; }
        }
    </style>
</head>
<body>

    <div id="intro-screen" class="overlay">
        <div class="modal">
            <h2>WORDLE MABAR</h2>
            <p id="loading-text" style="color: var(--present); font-size: 14px; margin-bottom: 20px;">Memuat Kamus Server...</p>
            <input type="text" id="player-name" class="name-input" placeholder="Nama Panggilan..." maxlength="8" disabled>
            <button id="join-btn" class="btn-primary" disabled>JOIN ROOM</button>
        </div>
    </div>

    <div id="waiting-screen" class="overlay hidden">
        <div class="modal" style="background: transparent; border: none; box-shadow: none;">
            <h2 style="color: white; text-shadow: 0 2px 4px rgba(0,0,0,0.5);">Beres!</h2>
            <p style="color: #818384; font-size: 18px;">Menunggu temanmu selesai...</p>
            <div style="margin: 20px auto; width: 40px; height: 40px; border: 4px solid var(--border-color); border-top: 4px solid var(--correct); border-radius: 50%; animation: spin 1s linear infinite;"></div>
        </div>
    </div>

    <div id="result-screen" class="overlay hidden">
        <div class="modal">
            <h2>Papan Skor</h2>
            <p id="word-reveal" style="color: var(--text-color); margin-bottom: 20px;">Kata: <b style="color:var(--correct)">APPLE</b></p>
            <div id="leaderboard-list" style="background: var(--bg-color); border-radius: 8px; padding: 10px; margin-bottom: 20px;"></div>
            <p style="color: #818384; font-size: 14px;">Mulai ronde baru dalam: <span id="countdown" style="color: white; font-weight: bold;">5</span></p>
        </div>
    </div>

    <div id="sidebar">
        <div class="sidebar-title">Lobby Room</div>
        <div id="players-container" style="display: flex; flex-direction: inherit; gap: 10px;"></div>
    </div>

    <div id="main-area">
        <header><h1>WORDLE</h1></header>
        <div id="board"></div>
        <div id="keyboard"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        // TAMBAHAN: onDisconnect untuk menghapus hantu dari database
        import { getDatabase, ref, set, get, onValue, onDisconnect } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD7-9h9ut1u1TUB1hCMhhWGqW6-yMLDvCk",
            authDomain: "wordle-mabar-2417d.firebaseapp.com",
            projectId: "wordle-mabar-2417d",
            storageBucket: "wordle-mabar-2417d.firebasestorage.app",
            messagingSenderId: "227454413033",
            appId: "1:227454413033:web:f56501a90a593b6279e878",
            measurementId: "G-JS0R22BZ6Q",
            databaseURL: "https://wordle-mabar-2417d-default-rtdb.asia-southeast1.firebasedatabase.app"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        const playersRef = ref(db, 'room1/players');
        const gameStateRef = ref(db, 'room1/gameState');

        const commonWords = ["APPLE", "WATER", "HOUSE", "MUSIC", "BOARD", "DREAM", "SMILE", "NIGHT", "LIGHT", "HEART", "TRAIN", "PLANT", "SPACE", "DANCE", "GHOST", "PIZZA", "RIVER", "STONE", "BEACH", "CLOCK", "AUDIO", "TRACK", "BEATS", "VOCAL", "COLOR", "SHAPE", "PIXEL", "BRUSH", "DRAFT", "START", "PRESS", "CLICK", "MOUSE", "YOUTH", "PEACE", "TRUTH", "TRUST", "VALUE", "VOICE", "EARTH"];
        
        let validWords = new Set();
        let targetWord = "";
        let myName = "";
        
        const maxGuesses = 6;
        let currentGuess = "";
        let guesses = [];
        let myProgressArray = [];
        let isMyTurnDone = false;
        let roomPlayers = {}; 

        const board = document.getElementById("board");
        const keyboard = document.getElementById("keyboard");
        const introScreen = document.getElementById("intro-screen");
        const waitingScreen = document.getElementById("waiting-screen");
        const resultScreen = document.getElementById("result-screen");
        const playersContainer = document.getElementById("players-container");

        function initGame() {
            fetch("https://raw.githubusercontent.com/dwyl/english-words/refs/heads/master/words.txt")
                .then(res => res.text())
                .then(text => {
                    text.split('\n').forEach(w => {
                        let clean = w.trim().toUpperCase();
                        if (clean.length === 5) validWords.add(clean);
                    });
                    commonWords.forEach(w => validWords.add(w)); 
                    
                    document.getElementById("loading-text").textContent = "Koneksi Tersambung! Silakan masukkan nama.";
                    document.getElementById("loading-text").style.color = "var(--correct)";
                    document.getElementById("player-name").disabled = false;
                    document.getElementById("join-btn").disabled = false;
                }).catch(err => alert("Gagal memuat kamus, pastikan ada internet."));

            buildBoard();
            buildKeyboard();
        }

        function buildBoard() {
            board.innerHTML = "";
            for (let i = 0; i < maxGuesses; i++) {
                let row = document.createElement("div"); row.className = "row"; row.id = `row-${i}`;
                for (let j = 0; j < 5; j++) {
                    let box = document.createElement("div"); box.className = "box"; row.appendChild(box);
                }
                board.appendChild(row);
            }
        }

        const keys = [
            ['Q', 'W', 'E', 'R', 'T', 'Y', 'U', 'I', 'O', 'P'],
            ['A', 'S', 'D', 'F', 'G', 'H', 'J', 'K', 'L'],
            ['ENTER', 'Z', 'X', 'C', 'V', 'B', 'N', 'M', '⌫']
        ];

        function buildKeyboard() {
            keyboard.innerHTML = "";
            keys.forEach(row => {
                let rowDiv = document.createElement("div"); rowDiv.className = "key-row";
                row.forEach(key => {
                    let keyDiv = document.createElement("div"); keyDiv.className = "key";
                    if (key === 'ENTER' || key === '⌫') keyDiv.classList.add("large");
                    keyDiv.textContent = key; keyDiv.id = `key-${key}`;
                    keyDiv.onclick = () => handleInput(key);
                    rowDiv.appendChild(keyDiv);
                });
                keyboard.appendChild(rowDiv);
            });
        }

        document.getElementById("join-btn").onclick = async () => {
            const inputName = document.getElementById("player-name").value.trim().toUpperCase();
            if (inputName.length < 2) return alert("Nama minimal 2 huruf!");
            myName = inputName;
            introScreen.classList.add("hidden");
            
            try {
                // CEK KATA (Akan error ke 'catch' kalau rules Firebase ditutup)
                const gameSnap = await get(gameStateRef);
                if (gameSnap.exists() && gameSnap.val().currentWord) {
                    targetWord = gameSnap.val().currentWord;
                } else {
                    targetWord = commonWords[Math.floor(Math.random() * commonWords.length)];
                    set(gameStateRef, { currentWord: targetWord });
                }
                console.log("Kata Ronde Ini:", targetWord);

                // FITUR SAKTI: Hapus data otomatis kalau user close tab / keluar
                const myPlayerRef = ref(db, 'room1/players/' + myName);
                onDisconnect(myPlayerRef).remove();

                updateMyStatus("PLAYING", []);

                // SINKRONISASI PEMAIN LAIN
                onValue(playersRef, (snapshot) => {
                    if (snapshot.exists()) {
                        roomPlayers = snapshot.val();
                    } else {
                        roomPlayers = {}; // Kosongkan jika semua keluar
                    }
                    renderSidebar();
                    checkIfAllDone();
                });

                // SINKRONISASI RONDE BARU
                onValue(gameStateRef, (snapshot) => {
                    if (snapshot.exists() && snapshot.val().currentWord) {
                        let newWord = snapshot.val().currentWord;
                        if (newWord !== targetWord && isMyTurnDone) {
                            targetWord = newWord;
                            resetForNextRound();
                        }
                    }
                });

            } catch (error) {
                console.error("Firebase Error:", error);
                alert("Gagal Terhubung ke Database! Cek Rules Firebase (harus true).");
                introScreen.classList.remove("hidden");
            }
        };

        function handleInput(key) {
            if (isMyTurnDone) return;
            
            if (key === '⌫' || key === 'Backspace') {
                currentGuess = currentGuess.slice(0, -1);
            } else if (key === 'ENTER' || key === 'Enter') {
                if (currentGuess.length === 5) {
                    if (!validWords.has(currentGuess)) {
                        shakeRow();
                        return;
                    }
                    processGuess();
                }
            } else if (/^[a-zA-Z]$/.test(key) && currentGuess.length < 5) {
                currentGuess += key.toUpperCase();
            }
            updateBoardVisuals();
        }

        function updateBoardVisuals() {
            const row = document.getElementById(`row-${guesses.length}`);
            if (!row) return;
            for (let i = 0; i < 5; i++) {
                row.children[i].textContent = currentGuess[i] || "";
            }
        }

        function shakeRow() {
            const row = document.getElementById(`row-${guesses.length}`);
            row.style.transform = "translateX(-5px)";
            setTimeout(() => row.style.transform = "translateX(5px)", 50);
            setTimeout(() => row.style.transform = "translateX(-5px)", 100);
            setTimeout(() => row.style.transform = "translateX(5px)", 150);
            setTimeout(() => row.style.transform = "translateX(0)", 200);
        }

        function processGuess() {
            let guessArr = currentGuess.split("");
            let targetArr = targetWord.split("");
            let status = Array(5).fill("absent");
            
            for (let i = 0; i < 5; i++) {
                if (guessArr[i] === targetArr[i]) { status[i] = "correct"; targetArr[i] = null; }
            }
            for (let i = 0; i < 5; i++) {
                if (status[i] !== "correct" && targetArr.includes(guessArr[i])) {
                    status[i] = "present"; targetArr[targetArr.indexOf(guessArr[i])] = null;
                }
            }

            const row = document.getElementById(`row-${guesses.length}`);
            let rowProgress = [];

            for (let i = 0; i < 5; i++) {
                row.children[i].classList.add(status[i]);
                document.getElementById(`key-${guessArr[i]}`).classList.add(status[i]);
                rowProgress.push(status[i] === 'correct' ? 2 : (status[i] === 'present' ? 1 : 0));
            }

            guesses.push(currentGuess);
            myProgressArray.push(rowProgress);
            
            if (currentGuess === targetWord || guesses.length === maxGuesses) {
                isMyTurnDone = true;
                updateMyStatus("DONE", myProgressArray);
            } else {
                updateMyStatus("PLAYING", myProgressArray);
            }
            currentGuess = "";
        }

        function updateMyStatus(status, progress) {
            // Update paksa secara lokal biar UI merespons seketika
            roomPlayers[myName] = { status: status, progress: progress };
            renderSidebar();

            // Push ke Firebase
            set(ref(db, 'room1/players/' + myName), {
                status: status,
                progress: progress
            });

            if (status === "DONE") {
                waitingScreen.classList.remove("hidden");
                checkIfAllDone();
            }
        }

        function renderSidebar() {
            playersContainer.innerHTML = "";
            for (let pName in roomPlayers) {
                let data = roomPlayers[pName];
                let gridHTML = "";
                if (data.progress && data.progress.length > 0) {
                    data.progress.forEach(row => {
                        gridHTML += `<div class="mini-row">`;
                        row.forEach(stat => {
                            let colorClass = stat === 2 ? "mini-green" : (stat === 1 ? "mini-yellow" : "mini-gray");
                            gridHTML += `<div class="mini-box ${colorClass}"></div>`;
                        });
                        gridHTML += `</div>`;
                    });
                }
                
                let isDoneClass = data.status === "DONE" ? "done" : "";
                
                let html = `
                    <div class="player-card ${isDoneClass}">
                        <div class="avatar">${pName.charAt(0)}</div>
                        <div class="player-info">
                            <div class="player-name">${pName} ${pName === myName ? "(Kamu)" : ""}</div>
                            <div class="mini-grid">${gridHTML}</div>
                        </div>
                    </div>
                `;
                playersContainer.innerHTML += html;
            }
        }

        function checkIfAllDone() {
            let allDone = true;
            let totalPlayers = 0;
            for (let p in roomPlayers) {
                totalPlayers++;
                if (roomPlayers[p].status !== "DONE") allDone = false;
            }

            if (totalPlayers > 0 && allDone && isMyTurnDone) {
                showResultScreen();
            }
        }

        function showResultScreen() {
            waitingScreen.classList.add("hidden");
            resultScreen.classList.remove("hidden");
            
            document.getElementById("word-reveal").innerHTML = `Kata: <b style="color:var(--correct)">${targetWord}</b>`;
            
            let lb = document.getElementById("leaderboard-list");
            lb.innerHTML = "";
            for (let p in roomPlayers) {
                let tries = roomPlayers[p].progress ? roomPlayers[p].progress.length : 0;
                lb.innerHTML += `
                    <div class="result-item">
                        <span style="font-weight:bold;">${p}</span>
                        <span style="color:#818384;">${tries} Tebakan</span>
                    </div>
                `;
            }

            let playerNames = Object.keys(roomPlayers).sort();
            if (myName === playerNames[0]) {
                let timer = 5;
                document.getElementById("countdown").textContent = timer;
                let iv = setInterval(() => {
                    timer--;
                    document.getElementById("countdown").textContent = timer;
                    if (timer <= 0) {
                        clearInterval(iv);
                        let newWord = commonWords[Math.floor(Math.random() * commonWords.length)];
                        set(gameStateRef, { currentWord: newWord });
                    }
                }, 1000);
            } else {
                document.getElementById("countdown").textContent = "Menunggu Host...";
            }
        }

        function resetForNextRound() {
            resultScreen.classList.add("hidden");
            
            guesses = [];
            currentGuess = "";
            myProgressArray = [];
            isMyTurnDone = false;
            
            document.querySelectorAll(".box").forEach(b => {
                b.textContent = ""; b.className = "box";
            });
            document.querySelectorAll(".key").forEach(k => {
                k.className = "key";
                if (k.textContent === 'ENTER' || k.textContent === '⌫') k.classList.add("large");
            });

            updateMyStatus("PLAYING", []);
        }

        document.addEventListener("keydown", (e) => {
            if (introScreen.classList.contains("hidden") && waitingScreen.classList.contains("hidden") && resultScreen.classList.contains("hidden")) {
                handleInput(e.key);
            }
        });

        initGame();
    </script>
</body>
</html>
