<!doctype html>
<html lang="id">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Wordle Mabar - Full Version</title>

        <style>
            /* --- 1. VARIABEL WARNA (DARK MODE MODERN) --- */
            :root {
                --bg-color: #121213;
                --text-color: #ffffff;
                --border-color: #3a3a3c;
                --correct: #538d4e;
                --present: #b59f3b;
                --absent: #3a3a3c;
                --sidebar-bg: #1e1e1f;
            }

            * {
                box-sizing: border-box;
                font-family: "Inter", "Helvetica Neue", Arial, sans-serif;
            }
            body {
                background-color: var(--bg-color);
                color: var(--text-color);
                margin: 0;
                display: flex;
                height: 100vh;
                overflow: hidden;
            }

            /* --- 2. SIDEBAR MULTIPLAYER (Cuma Kotak-kotak) --- */
            #sidebar {
                width: 260px;
                background-color: var(--sidebar-bg);
                border-right: 1px solid var(--border-color);
                padding: 20px;
                display: flex;
                flex-direction: column;
                gap: 15px;
                overflow-y: auto;
                z-index: 10;
            }
            .sidebar-title {
                font-size: 14px;
                text-transform: uppercase;
                letter-spacing: 1px;
                color: #818384;
                margin-bottom: 5px;
                border-bottom: 1px solid var(--border-color);
                padding-bottom: 10px;
            }
            .player-card {
                display: flex;
                align-items: center;
                gap: 12px;
                background: rgba(255, 255, 255, 0.03);
                padding: 10px;
                border-radius: 8px;
                border: 1px solid transparent;
            }
            .player-card.done {
                border-color: var(--correct);
            } /* Tanda kalau dia udah beres */
            .avatar {
                width: 35px;
                height: 35px;
                background-color: var(--border-color);
                border-radius: 50%;
                display: flex;
                justify-content: center;
                align-items: center;
                font-size: 18px;
            }
            .player-info {
                display: flex;
                flex-direction: column;
                gap: 5px;
            }
            .player-name {
                font-size: 13px;
                font-weight: bold;
            }

            .mini-grid {
                display: flex;
                flex-direction: column;
                gap: 2px;
            }
            .mini-row {
                display: flex;
                gap: 2px;
            }
            .mini-box {
                width: 8px;
                height: 8px;
                background-color: #818384;
                border-radius: 1px;
            }
            .mini-green {
                background-color: var(--correct);
            }
            .mini-yellow {
                background-color: var(--present);
            }
            .mini-gray {
                background-color: var(--absent);
            }

            /* --- 3. AREA GAME UTAMA --- */
            #main-area {
                flex-grow: 1;
                display: flex;
                flex-direction: column;
                align-items: center;
                padding: 20px;
                position: relative;
            }
            header {
                width: 100%;
                max-width: 500px;
                border-bottom: 1px solid var(--border-color);
                display: flex;
                justify-content: center;
                padding-bottom: 10px;
                margin-bottom: 30px;
            }
            header h1 {
                margin: 0;
                font-size: 32px;
                font-weight: 700;
                letter-spacing: 2px;
            }

            #board {
                display: grid;
                grid-template-rows: repeat(6, 1fr);
                gap: 5px;
                margin-bottom: 30px;
            }
            .row {
                display: grid;
                grid-template-columns: repeat(5, 1fr);
                gap: 5px;
                transition: transform 0.1s;
            }
            .box {
                width: 62px;
                height: 62px;
                border: 2px solid var(--border-color);
                display: flex;
                justify-content: center;
                align-items: center;
                font-size: 32px;
                font-weight: bold;
                text-transform: uppercase;
            }

            /* --- 4. KEYBOARD --- */
            #keyboard {
                display: flex;
                flex-direction: column;
                gap: 8px;
                align-items: center;
                width: 100%;
                max-width: 500px;
            }
            .key-row {
                display: flex;
                gap: 6px;
                justify-content: center;
                width: 100%;
            }
            .key {
                flex: 1;
                height: 58px;
                background-color: #818384;
                border-radius: 4px;
                display: flex;
                justify-content: center;
                align-items: center;
                font-weight: bold;
                cursor: pointer;
                user-select: none;
                max-width: 43px;
                transition: background-color 0.2s;
            }
            .key.large {
                max-width: 65px;
                font-size: 12px;
            }

            .correct {
                background-color: var(--correct) !important;
                border-color: var(--correct) !important;
                color: white;
            }
            .present {
                background-color: var(--present) !important;
                border-color: var(--present) !important;
                color: white;
            }
            .absent {
                background-color: var(--absent) !important;
                border-color: var(--absent) !important;
                color: white;
            }

            /* --- 5. OVERLAY MODALS (Intro, Nunggu, Hasil) --- */
            .overlay {
                position: fixed;
                top: 0;
                left: 0;
                width: 100vw;
                height: 100vh;
                background: rgba(18, 18, 19, 0.9);
                backdrop-filter: blur(5px);
                display: flex;
                justify-content: center;
                align-items: center;
                z-index: 1000;
                transition: opacity 0.3s ease;
            }
            .modal {
                background: var(--sidebar-bg);
                border: 1px solid var(--border-color);
                border-radius: 12px;
                padding: 30px;
                width: 90%;
                max-width: 400px;
                text-align: center;
                box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
                transform: translateY(0);
                transition: transform 0.3s ease;
            }
            .modal h2 {
                margin-top: 0;
                font-size: 24px;
                margin-bottom: 10px;
            }
            .hidden {
                opacity: 0;
                pointer-events: none;
            }
            .hidden .modal {
                transform: translateY(-50px);
            }

            .name-input {
                width: 100%;
                padding: 12px;
                border-radius: 6px;
                border: 2px solid var(--border-color);
                background: var(--bg-color);
                color: white;
                font-size: 16px;
                margin-bottom: 15px;
                text-align: center;
                outline: none;
            }
            .name-input:focus {
                border-color: #818384;
            }
            .btn-primary {
                background: var(--correct);
                color: white;
                border: none;
                padding: 12px 24px;
                font-size: 16px;
                font-weight: bold;
                border-radius: 6px;
                cursor: pointer;
                width: 100%;
                transition: opacity 0.2s;
            }
            .btn-primary:hover {
                opacity: 0.8;
            }
            .btn-primary:disabled {
                background: #818384;
                cursor: not-allowed;
            }

            .result-item {
                display: flex;
                justify-content: space-between;
                align-items: center;
                padding: 10px;
                border-bottom: 1px solid var(--border-color);
            }
            .result-item:last-child {
                border-bottom: none;
            }

            /* --- RESPONSIVE --- */
            @media (max-width: 768px) {
                body {
                    flex-direction: column;
                }
                #sidebar {
                    width: 100%;
                    height: 130px;
                    border-right: none;
                    border-bottom: 1px solid var(--border-color);
                    flex-direction: row;
                    overflow-x: auto;
                    padding: 10px;
                }
                .player-card {
                    flex-direction: column;
                    align-items: center;
                    gap: 5px;
                    min-width: 80px;
                }
                .box {
                    width: 50px;
                    height: 50px;
                    font-size: 24px;
                }
                .key {
                    height: 50px;
                    max-width: 35px;
                }
            }
        </style>
    </head>
    <body>
        <div id="intro-screen" class="overlay">
            <div class="modal">
                <h2>WORDLE MABAR</h2>
                <p
                    id="loading-text"
                    style="
                        color: var(--present);
                        font-size: 14px;
                        margin-bottom: 20px;
                    "
                >
                    Memuat Kamus Bahasa Inggris...
                </p>
                <input
                    type="text"
                    id="player-name"
                    class="name-input"
                    placeholder="Masukkan Namamu..."
                    maxlength="10"
                    disabled
                />
                <button id="join-btn" class="btn-primary" disabled>
                    JOIN GAME
                </button>
            </div>
        </div>

        <div id="waiting-screen" class="overlay hidden">
            <div
                class="modal"
                style="background: transparent; border: none; box-shadow: none"
            >
                <h2
                    style="
                        color: white;
                        text-shadow: 0 2px 4px rgba(0, 0, 0, 0.5);
                    "
                >
                    Beres!
                </h2>
                <p style="color: #818384; font-size: 18px">
                    Menunggu pemain lain selesai...
                </p>
                <div
                    style="
                        margin: 20px auto;
                        width: 40px;
                        height: 40px;
                        border: 4px solid var(--border-color);
                        border-top: 4px solid var(--correct);
                        border-radius: 50%;
                        animation: spin 1s linear infinite;
                    "
                ></div>
            </div>
        </div>
        <style>
            @keyframes spin {
                0% {
                    transform: rotate(0deg);
                }
                100% {
                    transform: rotate(360deg);
                }
            }
        </style>

        <div id="result-screen" class="overlay hidden">
            <div class="modal">
                <h2>Papan Skor</h2>
                <p
                    id="word-reveal"
                    style="color: var(--text-color); margin-bottom: 20px"
                >
                    Kata: <b style="color: var(--correct)">APPLE</b>
                </p>
                <div
                    id="leaderboard-list"
                    style="
                        background: var(--bg-color);
                        border-radius: 8px;
                        padding: 10px;
                        margin-bottom: 20px;
                    "
                ></div>
                <p style="color: #818384; font-size: 14px">
                    Mulai kata baru dalam:
                    <span id="countdown" style="color: white; font-weight: bold"
                        >5</span
                    >
                </p>
            </div>
        </div>

        <div id="sidebar">
            <div class="sidebar-title">Lobby Room</div>
            <div
                id="players-container"
                style="display: flex; flex-direction: inherit; gap: 10px"
            ></div>
        </div>

        <div id="main-area">
            <header>
                <h1>WORDLE</h1>
            </header>
            <div id="board"></div>
            <div id="keyboard"></div>
        </div>

        <script type="module">
            import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
            import {
                getDatabase,
                ref,
                set,
                onValue,
                update,
            } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

            // KAMU TINGGAL ISI INI NANTI KALAU MAU MULTIPLAYER ASLI:
            const firebaseConfig = {
                apiKey: "KOSONG",
                authDomain: "KOSONG",
                databaseURL: "KOSONG",
                projectId: "KOSONG",
            };

            let db = null;
            // Cek apakah config sudah diisi (bukan KOSONG)
            if (firebaseConfig.apiKey !== "KOSONG") {
                const app = initializeApp(firebaseConfig);
                db = getDatabase(app);
                window.firebaseDb = db; // Expose ke script bawah
                console.log("Firebase Terhubung!");
            } else {
                console.log(
                    "Jalan di Mode Lokal (Simulasi) karena Firebase belum diisi.",
                );
            }
        </script>

        <script>
            // --- DATA & STATE ---
            const commonWords = [
                "APPLE",
                "WATER",
                "HOUSE",
                "MUSIC",
                "BOARD",
                "DREAM",
                "SMILE",
                "NIGHT",
                "LIGHT",
                "HEART",
                "TRAIN",
                "PLANT",
                "SPACE",
                "DANCE",
                "GHOST",
                "PIZZA",
                "RIVER",
                "STONE",
                "BEACH",
                "CLOCK",
                "AUDIO",
                "TRACK",
                "BEATS",
                "VOCAL",
                "COLOR",
                "SHAPE",
                "PIXEL",
                "BRUSH",
                "DRAFT",
                "START",
                "PRESS",
                "CLICK",
                "MOUSE",
                "YOUTH",
                "PEACE",
                "TRUTH",
                "TRUST",
                "VALUE",
                "VOICE",
                "EARTH",
            ];

            let validWords = new Set();
            let targetWord = "";
            let myName = "";

            const maxGuesses = 6;
            let currentGuess = "";
            let guesses = [];
            let myProgressArray = [];
            let isMyTurnDone = false;

            // State Room Multiplayer
            let roomPlayers = {}; // Menyimpan data semua orang di room

            // DOM Elements
            const board = document.getElementById("board");
            const keyboard = document.getElementById("keyboard");
            const introScreen = document.getElementById("intro-screen");
            const waitingScreen = document.getElementById("waiting-screen");
            const resultScreen = document.getElementById("result-screen");
            const playersContainer =
                document.getElementById("players-container");

            // --- INISIALISASI ---
            function initGameData() {
                // Ambil Kamus DWYL
                fetch(
                    "https://raw.githubusercontent.com/dwyl/english-words/refs/heads/master/words.txt",
                )
                    .then((res) => res.text())
                    .then((text) => {
                        text.split("\n").forEach((w) => {
                            let clean = w.trim().toUpperCase();
                            if (clean.length === 5) validWords.add(clean);
                        });
                        commonWords.forEach((w) => validWords.add(w)); // Safety

                        // Buka gembok tombol Join
                        document.getElementById("loading-text").textContent =
                            "Kamus siap! Silakan masukkan nama.";
                        document.getElementById("loading-text").style.color =
                            "var(--correct)";
                        document.getElementById("player-name").disabled = false;
                        document.getElementById("join-btn").disabled = false;
                    })
                    .catch((err) => {
                        alert("Gagal load kamus, refresh halaman.");
                    });

                buildBoard();
                buildKeyboard();
                pickRandomWord();
            }

            function buildBoard() {
                board.innerHTML = "";
                for (let i = 0; i < maxGuesses; i++) {
                    let row = document.createElement("div");
                    row.className = "row";
                    row.id = `row-${i}`;
                    for (let j = 0; j < 5; j++) {
                        let box = document.createElement("div");
                        box.className = "box";
                        row.appendChild(box);
                    }
                    board.appendChild(row);
                }
            }

            const keys = [
                ["Q", "W", "E", "R", "T", "Y", "U", "I", "O", "P"],
                ["A", "S", "D", "F", "G", "H", "J", "K", "L"],
                ["ENTER", "Z", "X", "C", "V", "B", "N", "M", "⌫"],
            ];

            function buildKeyboard() {
                keyboard.innerHTML = "";
                keys.forEach((row) => {
                    let rowDiv = document.createElement("div");
                    rowDiv.className = "key-row";
                    row.forEach((key) => {
                        let keyDiv = document.createElement("div");
                        keyDiv.className = "key";
                        if (key === "ENTER" || key === "⌫")
                            keyDiv.classList.add("large");
                        keyDiv.textContent = key;
                        keyDiv.id = `key-${key}`;
                        keyDiv.onclick = () => handleInput(key);
                        rowDiv.appendChild(keyDiv);
                    });
                    keyboard.appendChild(rowDiv);
                });
            }

            function pickRandomWord() {
                targetWord =
                    commonWords[Math.floor(Math.random() * commonWords.length)];
                console.log("Jawaban Ronde Ini:", targetWord);
            }

            // --- FLOW INTERAKSI UI ---
            document.getElementById("join-btn").onclick = () => {
                const inputName = document
                    .getElementById("player-name")
                    .value.trim()
                    .toUpperCase();
                if (inputName.length < 2) return alert("Nama minimal 2 huruf!");
                myName = inputName;
                introScreen.classList.add("hidden");

                // Masuk Room
                updateMyStatus("PLAYING", []);

                // Jika mode lokal (belum ada Firebase), jalankan simulasi Bot (Nugi & Temen)
                if (!window.firebaseDb) startLocalSimulation();
            };

            // --- LOGIKA KETIK & TEBAK ---
            function handleInput(key) {
                if (isMyTurnDone) return;

                if (key === "⌫" || key === "Backspace") {
                    currentGuess = currentGuess.slice(0, -1);
                } else if (key === "ENTER" || key === "Enter") {
                    if (currentGuess.length === 5) {
                        if (!validWords.has(currentGuess)) {
                            shakeRow();
                            return;
                        }
                        processGuess();
                    }
                } else if (/^[a-zA-Z]$/.test(key) && currentGuess.length < 5) {
                    currentGuess += key.toUpperCase();
                }
                updateBoardVisuals();
            }

            function updateBoardVisuals() {
                const row = document.getElementById(`row-${guesses.length}`);
                if (!row) return;
                for (let i = 0; i < 5; i++) {
                    row.children[i].textContent = currentGuess[i] || "";
                }
            }

            function shakeRow() {
                const row = document.getElementById(`row-${guesses.length}`);
                row.style.transform = "translateX(-5px)";
                setTimeout(() => (row.style.transform = "translateX(5px)"), 50);
                setTimeout(
                    () => (row.style.transform = "translateX(-5px)"),
                    100,
                );
                setTimeout(
                    () => (row.style.transform = "translateX(5px)"),
                    150,
                );
                setTimeout(() => (row.style.transform = "translateX(0)"), 200);
            }

            function processGuess() {
                let guessArr = currentGuess.split("");
                let targetArr = targetWord.split("");
                let status = Array(5).fill("absent");

                for (let i = 0; i < 5; i++) {
                    if (guessArr[i] === targetArr[i]) {
                        status[i] = "correct";
                        targetArr[i] = null;
                    }
                }
                for (let i = 0; i < 5; i++) {
                    if (
                        status[i] !== "correct" &&
                        targetArr.includes(guessArr[i])
                    ) {
                        status[i] = "present";
                        targetArr[targetArr.indexOf(guessArr[i])] = null;
                    }
                }

                const row = document.getElementById(`row-${guesses.length}`);
                let rowProgress = [];

                for (let i = 0; i < 5; i++) {
                    row.children[i].classList.add(status[i]);
                    document
                        .getElementById(`key-${guessArr[i]}`)
                        .classList.add(status[i]);
                    rowProgress.push(
                        status[i] === "correct"
                            ? 2
                            : status[i] === "present"
                              ? 1
                              : 0,
                    );
                }

                guesses.push(currentGuess);
                myProgressArray.push(rowProgress);

                // Cek Menang / Kalah
                if (
                    currentGuess === targetWord ||
                    guesses.length === maxGuesses
                ) {
                    isMyTurnDone = true;
                    updateMyStatus("DONE", myProgressArray);

                    // Cek apakah semua orang udah selesai
                    checkIfAllDone();
                } else {
                    updateMyStatus("PLAYING", myProgressArray);
                }

                currentGuess = "";
            }

            // --- SISTEM MULTIPLAYER / SIDEBAR ---
            function updateMyStatus(status, progress) {
                roomPlayers[myName] = { status: status, progress: progress };
                renderSidebar();

                // Kalau Firebase nyala, push ke DB
                // Kode aslinya di sini nanti panggil Firebase update()

                if (status === "DONE") {
                    waitingScreen.classList.remove("hidden");
                }
            }

            function renderSidebar() {
                playersContainer.innerHTML = "";
                for (let pName in roomPlayers) {
                    let data = roomPlayers[pName];

                    // Bikin Mini Grid HTML
                    let gridHTML = "";
                    if (data.progress) {
                        data.progress.forEach((row) => {
                            gridHTML += `<div class="mini-row">`;
                            row.forEach((stat) => {
                                let colorClass =
                                    stat === 2
                                        ? "mini-green"
                                        : stat === 1
                                          ? "mini-yellow"
                                          : "mini-gray";
                                gridHTML += `<div class="mini-box ${colorClass}"></div>`;
                            });
                            gridHTML += `</div>`;
                        });
                    }

                    let isDoneClass = data.status === "DONE" ? "done" : "";

                    let html = `
                    <div class="player-card ${isDoneClass}">
                        <div class="avatar">${pName.charAt(0)}</div>
                        <div class="player-info">
                            <div class="player-name">${pName} ${pName === myName ? "(Kamu)" : ""}</div>
                            <div class="mini-grid">${gridHTML}</div>
                        </div>
                    </div>
                `;
                    playersContainer.innerHTML += html;
                }
            }

            // --- CEK SEMUA SELESAI & NEXT ROUND ---
            function checkIfAllDone() {
                let allDone = true;
                for (let p in roomPlayers) {
                    if (roomPlayers[p].status !== "DONE") allDone = false;
                }

                if (allDone && isMyTurnDone) {
                    showResultScreen();
                }
            }

            function showResultScreen() {
                waitingScreen.classList.add("hidden");
                resultScreen.classList.remove("hidden");

                document.getElementById("word-reveal").innerHTML =
                    `Kata: <b style="color:var(--correct)">${targetWord}</b>`;

                // Bikin List Leaderboard
                let lb = document.getElementById("leaderboard-list");
                lb.innerHTML = "";
                for (let p in roomPlayers) {
                    let tries = roomPlayers[p].progress
                        ? roomPlayers[p].progress.length
                        : 0;
                    lb.innerHTML += `
                    <div class="result-item">
                        <span style="font-weight:bold;">${p}</span>
                        <span style="color:#818384;">${tries} Tebakan</span>
                    </div>
                `;
                }

                // Hitung Mundur 5 Detik buat Next Game
                let timer = 5;
                document.getElementById("countdown").textContent = timer;
                let iv = setInterval(() => {
                    timer--;
                    document.getElementById("countdown").textContent = timer;
                    if (timer <= 0) {
                        clearInterval(iv);
                        resetForNextRound();
                    }
                }, 1000);
            }

            function resetForNextRound() {
                resultScreen.classList.add("hidden");

                // Reset Variabel
                guesses = [];
                currentGuess = "";
                myProgressArray = [];
                isMyTurnDone = false;

                // Bersihkan UI Papan & Keyboard
                document.querySelectorAll(".box").forEach((b) => {
                    b.textContent = "";
                    b.className = "box";
                });
                document.querySelectorAll(".key").forEach((k) => {
                    k.className = "key";
                    if (k.textContent === "ENTER" || k.textContent === "⌫")
                        k.classList.add("large");
                });

                pickRandomWord();
                updateMyStatus("PLAYING", []);

                // Kalau mode lokal, ulang simulasi temennya
                if (!window.firebaseDb) startLocalSimulation();
            }

            // --- SIMULASI LOKAL (BIAR BISA DI-TEST TANPA FIREBASE DULU) ---
            function startLocalSimulation() {
                roomPlayers["NUGI"] = { status: "PLAYING", progress: [] };
                roomPlayers["DOSEN"] = { status: "PLAYING", progress: [] };
                renderSidebar();

                // Simulasi Nugi main (Ngetik tiap 3 detik)
                let sim1 = setInterval(() => {
                    if (
                        roomPlayers["NUGI"].status === "DONE" ||
                        (isMyTurnDone && roomPlayers["DOSEN"].status === "DONE")
                    ) {
                        clearInterval(sim1);
                        return;
                    }
                    let prog = roomPlayers["NUGI"].progress;
                    prog.push([
                        Math.floor(Math.random() * 3),
                        Math.floor(Math.random() * 3),
                        Math.floor(Math.random() * 3),
                        Math.floor(Math.random() * 3),
                        Math.floor(Math.random() * 3),
                    ]);
                    if (prog.length >= Math.floor(Math.random() * 3) + 3)
                        roomPlayers["NUGI"].status = "DONE";
                    renderSidebar();
                    checkIfAllDone();
                }, 3000);

                // Simulasi Dosen main (Ngetik tiap 4 detik)
                let sim2 = setInterval(() => {
                    if (
                        roomPlayers["DOSEN"].status === "DONE" ||
                        (isMyTurnDone && roomPlayers["NUGI"].status === "DONE")
                    ) {
                        clearInterval(sim2);
                        return;
                    }
                    let prog = roomPlayers["DOSEN"].progress;
                    prog.push([
                        Math.floor(Math.random() * 3),
                        Math.floor(Math.random() * 3),
                        Math.floor(Math.random() * 3),
                        Math.floor(Math.random() * 3),
                        Math.floor(Math.random() * 3),
                    ]);
                    if (prog.length >= 6) roomPlayers["DOSEN"].status = "DONE";
                    renderSidebar();
                    checkIfAllDone();
                }, 4500);
            }

            // Listener Keyboard Fisik
            document.addEventListener("keydown", (e) => {
                if (
                    introScreen.classList.contains("hidden") &&
                    waitingScreen.classList.contains("hidden") &&
                    resultScreen.classList.contains("hidden")
                ) {
                    handleInput(e.key);
                }
            });

            // Jalankan saat web dibuka
            initGameData();
        </script>
    </body>
</html>
